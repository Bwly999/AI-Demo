<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>澄观 Lumina · AI 洞察引擎</title>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF8F3; --paper-2:#F5F1E8; --paper-3:#EFEADD; --paper-4:#E8E2D2;
    --ink:#1A1A18; --ink-2:#4A4A44; --ink-3:#7A7A70; --ink-4:#A5A096;
    --line:#E5E0D2; --line-2:#D8D1BE;
    --moss:#1F3A2E; --moss-2:#2D5A43; --moss-3:#3E7359; --moss-soft:#E8EFE9;
    --amber:#B87514; --amber-2:#D49628; --amber-soft:#F5E9D0;
    --clay:#A04428; --clay-soft:#F2DDD4;
    --slate:#3D4A5C; --slate-soft:#E2E6EC;
    --good:#3E7359; --warn:#B87514; --bad:#A04428;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--paper);color:var(--ink);font-size:14px;line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .serif{font-family:'Noto Serif SC',Georgia,serif}
  .mono{font-family:'JetBrains Mono',monospace}
  ::selection{background:var(--amber-soft)}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px;border:2px solid var(--paper)}
  ::-webkit-scrollbar-thumb:hover{background:var(--ink-4)}

  /* ===== Layout ===== */
  #root{display:flex;height:100vh;overflow:hidden}
  .sidebar{
    width:230px;flex-shrink:0;background:var(--moss);color:#E8E2D2;
    display:flex;flex-direction:column;padding:0;
  }
  .brand{padding:22px 22px 18px;border-bottom:1px solid rgba(255,255,255,.07)}
  .brand-mark{display:flex;align-items:center;gap:10px}
  .brand-dot{width:13px;height:13px;border-radius:50%;background:var(--amber-2);
    box-shadow:0 0 0 4px rgba(212,150,40,.18);animation:pulse 3.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(212,150,40,.18)}50%{box-shadow:0 0 0 7px rgba(212,150,40,.08)}}
  .brand-name{font-family:'Noto Serif SC',serif;font-weight:700;font-size:19px;color:#fff;letter-spacing:.02em}
  .brand-sub{font-size:10.5px;color:rgba(232,226,210,.5);margin-top:3px;letter-spacing:.14em;text-transform:uppercase}

  .role-switch{margin:16px 14px 8px;display:flex;background:rgba(0,0,0,.22);border-radius:9px;padding:3px}
  .role-switch button{flex:1;border:0;background:transparent;color:rgba(232,226,210,.6);
    padding:7px 4px;font-size:12px;font-weight:500;cursor:pointer;border-radius:7px;transition:.18s;
    font-family:inherit}
  .role-switch button.active{background:var(--amber-2);color:#1A1A18;font-weight:600}

  .nav-section{padding:6px 0}
  .nav-label{font-size:10px;color:rgba(232,226,210,.38);padding:14px 22px 6px;letter-spacing:.16em;text-transform:uppercase}
  .nav-item{display:flex;align-items:center;gap:11px;padding:8px 22px;font-size:13px;
    color:rgba(232,226,210,.72);cursor:pointer;border-left:2.5px solid transparent;transition:.15s}
  .nav-item:hover{background:rgba(255,255,255,.04);color:#fff}
  .nav-item.active{background:rgba(255,255,255,.06);color:#fff;border-left-color:var(--amber-2)}
  .nav-item .ni-ico{width:16px;height:16px;flex-shrink:0;opacity:.85}
  .nav-item .ni-badge{margin-left:auto;font-size:10px;background:var(--amber-2);color:#1A1A18;
    padding:1px 6px;border-radius:8px;font-weight:600}

  .sidebar-foot{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.07);
    display:flex;align-items:center;gap:10px}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--moss-3);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;flex-shrink:0}
  .sf-info{flex:1;min-width:0}
  .sf-name{font-size:12.5px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sf-role{font-size:10.5px;color:rgba(232,226,210,.45)}

  .main{flex:1;overflow-y:auto;position:relative}
  .topbar{position:sticky;top:0;z-index:20;background:rgba(250,248,243,.88);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 36px;height:58px}
  .topbar h1{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:600;color:var(--ink)}
  .topbar .crumb{font-size:12px;color:var(--ink-3)}
  .topbar .tb-spacer{flex:1}
  .search-box{display:flex;align-items:center;gap:8px;background:var(--paper-2);border:1px solid var(--line);
    border-radius:8px;padding:6px 12px;width:280px}
  .search-box input{border:0;background:transparent;outline:none;font-family:inherit;font-size:12.5px;
    color:var(--ink);width:100%}
  .search-box input::placeholder{color:var(--ink-4)}
  .tb-icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--paper-2);
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-2);position:relative;transition:.15s}
  .tb-icon-btn:hover{background:var(--paper-3)}
  .tb-dot{position:absolute;top:5px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--clay);border:1.5px solid var(--paper)}
  .content{padding:30px 36px 60px;max-width:1320px}

  /* ===== Cards / generic ===== */
  .card{background:#fff;border:1px solid var(--line);border-radius:11px}
  .card-pad{padding:22px}
  .eyebrow{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
  .muted{color:var(--ink-3)}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:20px;
    font-weight:500;white-space:nowrap}
  .chip-moss{background:var(--moss-soft);color:var(--moss)}
  .chip-amber{background:var(--amber-soft);color:var(--amber)}
  .chip-clay{background:var(--clay-soft);color:var(--clay)}
  .chip-slate{background:var(--slate-soft);color:var(--slate)}
  .chip-line{background:transparent;border:1px solid var(--line-2);color:var(--ink-2)}

  .btn{font-family:inherit;border:1px solid var(--line-2);background:#fff;color:var(--ink);
    padding:8px 15px;font-size:12.5px;border-radius:8px;cursor:pointer;font-weight:500;transition:.15s;
    display:inline-flex;align-items:center;gap:7px}
  .btn:hover{background:var(--paper-2)}
  .btn-primary{background:var(--moss);border-color:var(--moss);color:#fff}
  .btn-primary:hover{background:var(--moss-2)}
  .btn-amber{background:var(--amber-2);border-color:var(--amber-2);color:#1A1A18;font-weight:600}
  .btn-amber:hover{background:var(--amber)}
  .btn-sm{padding:5px 11px;font-size:11.5px}

  /* ===== Insight feed ===== */
  .feed-grid{display:grid;grid-template-columns:1fr 320px;gap:26px;align-items:start}
  .insight-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:22px 24px;
    cursor:pointer;transition:.16s;margin-bottom:16px;position:relative}
  .insight-card:hover{border-color:var(--ink-4);box-shadow:0 6px 22px rgba(31,58,46,.07);transform:translateY(-1px)}
  .insight-card.seen{opacity:.62}
  .ic-head{display:flex;align-items:center;gap:9px;margin-bottom:11px;flex-wrap:wrap}
  .ic-priority{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600}
  .pri-1{color:var(--clay)}
  .pri-2{color:var(--amber)}
  .pri-3{color:var(--ink-3)}
  .ic-priority .pri-dot{width:7px;height:7px;border-radius:50%}
  .pri-1 .pri-dot{background:var(--clay)}
  .pri-2 .pri-dot{background:var(--amber-2)}
  .pri-3 .pri-dot{background:var(--ink-4)}
  .ic-time{font-size:11px;color:var(--ink-4);margin-left:auto}
  .ic-title{font-family:'Noto Serif SC',serif;font-size:17.5px;font-weight:600;color:var(--ink);
    line-height:1.45;margin-bottom:9px}
  .ic-summary{font-size:13px;color:var(--ink-2);line-height:1.7}
  .ic-foot{display:flex;align-items:center;gap:14px;margin-top:15px;padding-top:14px;border-top:1px dashed var(--line);flex-wrap:wrap}
  .ic-stat{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink-3)}
  .ic-conf{display:flex;align-items:center;gap:7px}
  .conf-bar{width:54px;height:5px;background:var(--paper-3);border-radius:4px;overflow:hidden}
  .conf-fill{height:100%;border-radius:4px}
  .ic-direction-tag{font-size:11px;color:var(--moss-2);font-weight:500}

  .side-panel{position:sticky;top:84px}
  .side-card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:18px}
  .side-title{font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:14px;display:flex;align-items:center;gap:8px}

  /* trend mini */
  .trend-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--paper-2)}
  .trend-row:last-child{border:0}
  .trend-name{flex:1;font-size:12.5px;color:var(--ink)}
  .trend-val{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:600;color:var(--moss)}
  .trend-spark{width:60px;height:22px}

  /* ===== Detail view ===== */
  .detail-hero{margin-bottom:24px}
  .detail-title{font-family:'Noto Serif SC',serif;font-size:27px;font-weight:700;line-height:1.32;margin:10px 0 6px;color:var(--ink);max-width:780px}
  .detail-summary{font-size:14.5px;color:var(--ink-2);line-height:1.8;max-width:760px;margin-top:14px}
  .detail-grid{display:grid;grid-template-columns:1fr 300px;gap:30px}
  .detail-body h3{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:600;margin:26px 0 12px;color:var(--ink);display:flex;align-items:center;gap:9px}
  .detail-body p{font-size:13.5px;color:var(--ink-2);line-height:1.85;margin-bottom:10px}

  .evidence-chain{display:flex;flex-direction:column;gap:11px}
  .evidence{display:flex;gap:13px;padding:14px;background:var(--paper);border:1px solid var(--line);border-radius:9px}
  .ev-num{width:24px;height:24px;border-radius:50%;background:var(--moss);color:#fff;font-size:11px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600}
  .ev-body{flex:1;min-width:0}
  .ev-src{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ink-3);margin-bottom:4px}
  .ev-text{font-size:12.5px;color:var(--ink-2);line-height:1.6}
  .ev-link{font-size:11px;color:var(--moss-2);margin-top:5px;display:inline-flex;align-items:center;gap:4px;cursor:pointer}

  .action-card{display:flex;gap:14px;padding:15px 16px;background:var(--moss-soft);border:1px solid #CFE0D2;border-radius:10px;margin-bottom:10px;align-items:flex-start}
  .action-icon{width:30px;height:30px;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;color:var(--moss);flex-shrink:0}
  .action-body{flex:1}
  .action-title{font-size:13px;font-weight:600;color:var(--moss);margin-bottom:3px}
  .action-desc{font-size:12px;color:var(--ink-2);line-height:1.55}

  .meta-side .meta-block{padding:16px 18px;border:1px solid var(--line);border-radius:10px;margin-bottom:14px;background:#fff}
  .meta-label{font-size:10.5px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;font-weight:600}

  /* ===== Today / Overview ===== */
  .hero-strip{background:linear-gradient(115deg,var(--moss) 0%,#274734 60%,#1F3A2E 100%);
    border-radius:16px;padding:30px 34px;color:#EDE9DC;margin-bottom:28px;position:relative;overflow:hidden}
  .hero-strip::after{content:'';position:absolute;right:-40px;top:-40px;width:240px;height:240px;
    background:radial-gradient(circle,rgba(212,150,40,.16),transparent 65%)}
  .hero-greet{font-size:12px;color:rgba(237,233,220,.6);letter-spacing:.1em}
  .hero-headline{font-family:'Noto Serif SC',serif;font-size:24px;font-weight:600;margin-top:6px;color:#fff;max-width:640px;line-height:1.4}
  .hero-sub{font-size:13px;color:rgba(237,233,220,.7);margin-top:8px;max-width:600px;line-height:1.6}
  .hero-stats{display:flex;gap:34px;margin-top:22px}
  .hero-stat-num{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:700;color:var(--amber-2);line-height:1}
  .hero-stat-lbl{font-size:11px;color:rgba(237,233,220,.6);margin-top:5px}

  .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:11px;padding:18px 20px}
  .kpi-lbl{font-size:11px;color:var(--ink-3);font-weight:500}
  .kpi-val{font-family:'Noto Serif SC',serif;font-size:26px;font-weight:700;margin:6px 0 4px;color:var(--ink)}
  .kpi-trend{font-size:11px;display:flex;align-items:center;gap:4px}
  .kpi-up{color:var(--good)}
  .kpi-down{color:var(--bad)}

  .two-col{display:grid;grid-template-columns:1.4fr 1fr;gap:22px}

  /* ===== Admin: directions ===== */
  .dir-card{display:flex;gap:18px;padding:20px 22px;background:#fff;border:1px solid var(--line);border-radius:11px;margin-bottom:14px;align-items:flex-start;cursor:pointer;transition:.15s}
  .dir-card:hover{border-color:var(--ink-4);box-shadow:0 4px 16px rgba(31,58,46,.06)}
  .dir-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
  .dir-body{flex:1;min-width:0}
  .dir-title{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600;color:var(--ink);margin-bottom:4px}
  .dir-desc{font-size:12.5px;color:var(--ink-2);line-height:1.6;margin-bottom:11px}
  .dir-meta{display:flex;gap:18px;font-size:11px;color:var(--ink-3);flex-wrap:wrap}
  .dir-meta span{display:inline-flex;align-items:center;gap:5px}
  .dir-toggle{display:flex;align-items:center}
  .toggle{width:38px;height:21px;border-radius:11px;background:var(--paper-3);position:relative;cursor:pointer;transition:.2s;flex-shrink:0}
  .toggle.on{background:var(--moss)}
  .toggle::after{content:'';position:absolute;width:17px;height:17px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .toggle.on::after{left:19px}

  /* ===== Admin: sources table ===== */
  .src-table{width:100%;border-collapse:collapse;font-size:12.5px}
  .src-table th{text-align:left;padding:11px 14px;font-size:11px;color:var(--ink-3);font-weight:600;
    text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--line)}
  .src-table td{padding:13px 14px;border-bottom:1px solid var(--paper-2);vertical-align:middle}
  .src-table tr:hover td{background:var(--paper)}
  .src-name{display:flex;align-items:center;gap:10px;font-weight:500;color:var(--ink)}
  .src-favicon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:600}
  .health{display:inline-flex;align-items:center;gap:6px;font-size:11.5px}
  .health-dot{width:7px;height:7px;border-radius:50%}

  /* ===== Schedule ===== */
  .timeline{position:relative;padding-left:24px}
  .timeline::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--line-2)}
  .tl-item{position:relative;padding:0 0 22px 22px}
  .tl-item::before{content:'';position:absolute;left:-22px;top:5px;width:12px;height:12px;border-radius:50%;background:#fff;border:2.5px solid var(--moss)}
  .tl-item.next::before{border-color:var(--amber-2);background:var(--amber-2)}
  .tl-time{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--ink-3);font-weight:500}
  .tl-name{font-size:13.5px;color:var(--ink);font-weight:500;margin:3px 0 4px}

  /* ===== Knowledge base ===== */
  .kb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}
  .kb-stat{padding:20px;background:#fff;border:1px solid var(--line);border-radius:11px}
  .kb-num{font-family:'Noto Serif SC',serif;font-size:28px;font-weight:700;color:var(--moss)}

  .prompt-box{background:#1F2430;color:#D8DCE6;border-radius:11px;padding:18px 20px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.75;overflow-x:auto}
  .prompt-box .k{color:#8AB4D8}
  .prompt-box .s{color:#D4A028}
  .prompt-box .c{color:#6E7585}

  /* ===== Monitor ===== */
  .monitor-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  .chart-card{background:#fff;border:1px solid var(--line);border-radius:11px;padding:20px}
  .chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .chart-title{font-size:13px;font-weight:600;color:var(--ink)}

  .bar-chart{display:flex;align-items:flex-end;gap:8px;height:130px;padding-top:10px}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{width:100%;border-radius:4px 4px 0 0;transition:.3s;min-height:3px}
  .bar-lbl{font-size:10px;color:var(--ink-3)}

  .donut-wrap{display:flex;align-items:center;gap:24px}
  .legend{display:flex;flex-direction:column;gap:9px}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:12px}
  .legend-dot{width:9px;height:9px;border-radius:2px}
  .legend-val{margin-left:auto;font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--ink-2)}

  /* ===== misc animations ===== */
  .fade-in{animation:fadeIn .4s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .progress-track{height:6px;background:var(--paper-3);border-radius:5px;overflow:hidden;width:100%}
  .progress-fill{height:100%;border-radius:5px;background:var(--moss)}

  .empty-note{font-size:11.5px;color:var(--ink-3);font-style:italic;padding:10px;background:var(--paper);border:1px dashed var(--line-2);border-radius:8px}

  .section-title{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:600;color:var(--ink);margin:0 0 4px}
  .section-desc{font-size:12.5px;color:var(--ink-3);margin-bottom:20px}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:24px}
  .tab{padding:10px 16px;font-size:13px;color:var(--ink-3);cursor:pointer;border-bottom:2px solid transparent;font-weight:500;transition:.15s}
  .tab:hover{color:var(--ink-2)}
  .tab.active{color:var(--moss);border-bottom-color:var(--moss);font-weight:600}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect} = React;

/* =========================================================
   ICONS (inline SVG, minimal stroke style)
========================================================= */
const Ico = {
  feed:(p)=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 11h16M4 6h16M4 16h10M4 21h7"/></svg>,
  today:(p)=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>,

function Sparkline({color='#3E7359',pts=[3,5,4,7,6,9,8,12]}){
  const w=60,h=22,max=Math.max(...pts),min=Math.min(...pts);
  const step=w/(pts.length-1);
  const d=pts.map((p,i)=>`${i===0?'M':'L'}${i*step},${h-((p-min)/(max-min))*(h-3)-1.5}`).join(' ');
  const area=`${d} L${w},${h} L0,${h} Z`;
  return (
    <svg className="trend-spark" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <path d={area} fill={color} opacity="0.12"/>
      <path d={d} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
    </svg>
  );
}

function App(){
  const [role,setRole]=useState('user');
  const [view,setView]=useState('today');
  const [insight,setInsight]=useState(null);

  useEffect(()=>{
    const sc=document.querySelector('.main');
    if(sc) sc.scrollTop=0;
  },[view,insight,role]);

  const titles={
    user:{today:['今日概览','你关注的方向与今日要点'],feed:['洞察 Feed','实时流动的洞察流'],
          sub:['我的订阅','方向与推送规则'],lib:['洞察文库','已沉淀的洞察归档']},
    admin:{dash:['控制台','系统全景监控'],dir:['洞察方向','定义引擎看什么'],
          src:['数据源','配置引擎的眼睛'],sched:['调度引擎','挖掘节奏与告警'],
          kb:['知识库','数据储备与向量索引'],model:['模型与提示词','模型路由与生成模板'],
          mon:['效果监控','洞察价值的闭环度量']}
  };
  const [title,crumb]=titles[role][view]||['',''];

  return (
    <React.Fragment>
      <Sidebar role={role} setRole={setRole} view={view} setView={setView} insight={insight} setInsight={setInsight}/>
      <div className="main">
        <Topbar title={title} crumb={crumb} role={role}/>
        <div className="content">
          {role==='user' && (
            insight ? <DetailView ins={insight} setInsight={setInsight}/> :
            view==='today'?<TodayView setInsight={setInsight}/>:
            view==='feed'?<FeedView setInsight={setInsight}/>:
            view==='sub'?<SubView/>:<LibView/>
          )}
          {role==='admin' && (
            view==='dash'?<AdminDash/>:
            view==='dir'?<DirView/>:
            view==='src'?<SrcView/>:
            view==='sched'?<SchedView/>:
            view==='kb'?<KbView/>:
            view==='model'?<ModelView/>:<MonView/>
          )}
        </div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
