<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pulse · 02 / Clean</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fafafa;
    --bg-soft:#f4f4f5;
    --card:#ffffff;
    --text:#0a0a0a;
    --text-dim:#525252;
    --text-faint:#a3a3a3;
    --line:#e4e4e7;
    --line-soft:#ededed;
    --indigo:#4f46e5;
    --indigo-soft:#eef2ff;
    --indigo-deep:#3730a3;
    --green:#059669;
    --red:#dc2626;
    --amber:#d97706;
    --r-sm:6px;
    --r:12px;
    --r-lg:18px;
    --sh-sm:0 1px 2px rgba(10,10,16,.04);
    --sh:0 1px 3px rgba(10,10,16,.06),0 4px 12px rgba(10,10,16,.04);
    --sh-h:0 8px 24px rgba(10,10,16,.08),0 16px 48px rgba(10,10,16,.06);
    --display:"Bricolage Grotesque",ui-sans-serif,system-ui,sans-serif;
    --sans:"Manrope",ui-sans-serif,system-ui,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    font-size:14px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(ellipse 900px 400px at 100% -100px, rgba(79,70,229,.06), transparent 70%),
      radial-gradient(ellipse 700px 300px at 0% 0%, rgba(79,70,229,.04), transparent 60%);
  }
  ::selection{background:var(--indigo);color:#fff}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit}

  /* ============== NAV ============== */
  nav.top{
    position:sticky;top:0;z-index:50;
    background:rgba(250,250,250,.82);
    backdrop-filter:blur(16px) saturate(180%);
    -webkit-backdrop-filter:blur(16px) saturate(180%);
    border-bottom:1px solid var(--line);
  }
  .nav-in{
    max-width:1240px;margin:0 auto;
    padding:14px 32px;
    display:flex;align-items:center;gap:24px;
  }
  .brand{
    display:flex;align-items:center;gap:10px;
    font-family:var(--display);
    font-weight:700;font-size:19px;
    letter-spacing:-.02em;
  }
  .brand-mark{
    width:28px;height:28px;border-radius:8px;
    background:linear-gradient(135deg,var(--indigo),#7c3aed);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 12px rgba(79,70,229,.35);
  }
  .brand-mark::after{
    content:"";width:10px;height:10px;border-radius:50%;
    background:#fff;
    box-shadow:0 0 0 2px rgba(255,255,255,.4);
  }
  .brand small{
    font-family:var(--sans);font-weight:500;
    font-size:11px;color:var(--text-faint);
    letter-spacing:.04em;
    background:#fff;border:1px solid var(--line);
    padding:2px 6px;border-radius:4px;
    margin-left:4px;
  }
  .nav-search{
    flex:1;max-width:380px;
    display:flex;align-items:center;gap:10px;
    background:#fff;
    border:1px solid var(--line);
    padding:8px 14px;border-radius:8px;
    font-size:13px;color:var(--text-faint);
    transition:.15s;
  }
  .nav-search:hover{border-color:#c8c8d0}
  .nav-search .kbd{
    margin-left:auto;
    font-family:var(--mono);font-size:10px;
    background:var(--bg-soft);padding:2px 6px;border-radius:4px;
    border:1px solid var(--line);
  }
  .nav-right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .nav-icon{
    width:34px;height:34px;border-radius:8px;
    background:#fff;border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    color:var(--text-dim);cursor:pointer;
    transition:.15s;font-size:15px;
  }
  .nav-icon:hover{background:var(--bg-soft);color:var(--text)}
  .avatar{
    width:34px;height:34px;border-radius:50%;
    background:linear-gradient(135deg,#fbbf24,#f97316);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:700;font-size:13px;
    font-family:var(--display);
  }

  /* ============== PAGE WRAP ============== */
  .wrap{max-width:1240px;margin:0 auto;padding:36px 32px 100px}

  /* ============== TIME ROW ============== */
  .time-row{
    display:flex;align-items:center;gap:8px;
    margin-bottom:32px;
    overflow-x:auto;padding-bottom:4px;
    scrollbar-width:none;
  }
  .time-row::-webkit-scrollbar{display:none}
  .time-label{
    font-family:var(--mono);font-size:11px;color:var(--text-faint);
    letter-spacing:.12em;text-transform:uppercase;
    margin-right:8px;white-space:nowrap;
  }
  .tchip{
    appearance:none;cursor:pointer;
    background:#fff;border:1px solid var(--line);
    padding:7px 14px;border-radius:999px;
    color:var(--text-dim);font-size:13px;font-weight:500;
    transition:.18s;white-space:nowrap;
    display:flex;align-items:center;gap:7px;
  }
  .tchip:hover{border-color:#c8c8d0;color:var(--text);transform:translateY(-1px)}
  .tchip .n{
    font-family:var(--mono);font-size:10px;
    background:var(--bg-soft);padding:1px 6px;border-radius:4px;
    color:var(--text-faint);
  }
  .tchip.on{
    background:var(--text);color:#fff;border-color:var(--text);
    box-shadow:0 4px 12px rgba(10,10,16,.18);
  }
  .tchip.on .n{background:rgba(255,255,255,.18);color:#fff}

  /* ============== HERO ============== */
  .hero{
    background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);
    border-radius:24px;
    padding:36px 38px;
    color:#fff;
    position:relative;overflow:hidden;
    margin-bottom:36px;
    box-shadow:0 20px 60px -20px rgba(48,43,99,.5);
  }
  .hero::before{
    content:"";position:absolute;inset:0;
    background:
      radial-gradient(circle 400px at 90% 10%, rgba(124,58,237,.45), transparent 60%),
      radial-gradient(circle 300px at 10% 100%, rgba(79,70,229,.35), transparent 60%);
    pointer-events:none;
  }
  .hero-grain{
    position:absolute;inset:0;opacity:.06;mix-blend-mode:overlay;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence baseFrequency='.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .hero-content{position:relative;z-index:2}
  .hero-eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--mono);font-size:11px;
    letter-spacing:.16em;text-transform:uppercase;
    color:#c4b5fd;
    margin-bottom:14px;
  }
  .hero-eyebrow::before{
    content:"";width:6px;height:6px;border-radius:50%;
    background:#a78bfa;box-shadow:0 0 12px #a78bfa;
    animation:pulse 2s infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
  .hero h1{
    font-family:var(--display);
    font-size:42px;font-weight:700;
    letter-spacing:-.025em;
    line-height:1.05;
    max-width:720px;
    margin-bottom:18px;
  }
  .hero h1 em{
    font-style:normal;
    background:linear-gradient(120deg,#c4b5fd,#f0abfc,#fbcfe8);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .hero-sub{
    font-size:15px;color:rgba(255,255,255,.78);
    max-width:620px;line-height:1.6;
    margin-bottom:28px;
  }
  .hero-stats{
    display:grid;grid-template-columns:repeat(4,1fr);
    gap:1px;
    background:rgba(255,255,255,.1);
    border-radius:14px;overflow:hidden;
    max-width:720px;
  }
  .hstat{
    background:rgba(255,255,255,.04);
    padding:16px 18px;
    backdrop-filter:blur(8px);
  }
  .hstat .l{font-size:11px;color:rgba(255,255,255,.55);margin-bottom:6px;letter-spacing:.04em}
  .hstat .v{font-family:var(--display);font-size:24px;font-weight:700;letter-spacing:-.02em}
  .hstat .v small{font-size:13px;font-weight:500;color:rgba(255,255,255,.6);margin-left:4px}

  /* ============== SECTION HEAD ============== */
  .sec-h{
    display:flex;align-items:baseline;gap:14px;
    margin-bottom:20px;
  }
  .sec-h h2{
    font-family:var(--display);
    font-size:24px;font-weight:700;letter-spacing:-.02em;
  }
  .sec-h .scope{
    font-family:var(--mono);font-size:11px;
    color:var(--indigo);
    background:var(--indigo-soft);
    padding:4px 10px;border-radius:6px;
    letter-spacing:.06em;
  }
  .sec-h .meta{margin-left:auto;font-size:13px;color:var(--text-faint)}

  /* ============== FEED ============== */
  .feed{
    display:flex;flex-direction:column;gap:14px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--r);
    padding:22px 24px;
    box-shadow:var(--sh-sm);
    transition:.22s cubic-bezier(.2,.7,.3,1);
    position:relative;
    cursor:pointer;
    animation:cup .4s cubic-bezier(.2,.7,.3,1) both;
  }
  @keyframes cup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .card:hover{
    transform:translateY(-2px);
    box-shadow:var(--sh-h);
    border-color:#d4d4d8;
  }
  .card.featured{
    border-color:transparent;
    background:linear-gradient(135deg,#fff,#fafaff);
    box-shadow:var(--sh),0 0 0 1px var(--indigo-soft) inset;
  }
  .card.featured::before{
    content:"AI 精选";
    position:absolute;top:0;left:24px;
    transform:translateY(-50%);
    background:var(--indigo);color:#fff;
    font-family:var(--mono);font-size:10px;font-weight:600;
    letter-spacing:.12em;
    padding:4px 10px;border-radius:4px;
    box-shadow:0 4px 12px rgba(79,70,229,.35);
  }

  .card-h{
    display:flex;align-items:center;gap:10px;
    margin-bottom:14px;
  }
  .src{
    display:flex;align-items:center;gap:8px;
    font-size:13px;color:var(--text-dim);font-weight:500;
  }
  .src-logo{
    width:22px;height:22px;border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--display);font-size:10px;font-weight:800;
    color:#fff;
  }
  .src-name{letter-spacing:-.005em}
  .verified{
    width:14px;height:14px;background:var(--indigo);
    color:#fff;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:9px;
  }
  .card-time{
    margin-left:auto;
    font-size:12px;color:var(--text-faint);
    font-family:var(--mono);
  }
  .imp-pill{
    background:var(--bg-soft);
    padding:3px 8px;border-radius:5px;
    font-size:10px;font-weight:600;
    color:var(--text-dim);
    letter-spacing:.06em;
  }
  .imp-pill.hi{background:#fef3c7;color:#92400e}
  .imp-pill.md{background:#dbeafe;color:#1e40af}

  .card-title{
    font-family:var(--display);
    font-size:20px;font-weight:600;
    letter-spacing:-.018em;
    line-height:1.3;
    margin-bottom:10px;
    color:var(--text);
  }
  .card-sum{
    font-size:14.5px;
    color:var(--text-dim);
    line-height:1.6;
    margin-bottom:16px;
  }
  .card-sum mark{
    background:linear-gradient(180deg,transparent 60%,#fde68a 60%);
    color:var(--text);padding:0 2px;
  }
  .card-foot{
    display:flex;align-items:center;gap:8px;
    padding-top:14px;
    border-top:1px solid var(--line-soft);
  }
  .topic-tag{
    font-size:12px;font-weight:500;
    color:var(--text-dim);
    background:var(--bg-soft);
    padding:4px 10px;border-radius:6px;
    transition:.15s;
  }
  .topic-tag::before{content:"#";color:var(--text-faint);margin-right:2px}
  .topic-tag:hover{background:var(--indigo-soft);color:var(--indigo)}

  .metric-mini{
    margin-left:auto;
    display:flex;align-items:center;gap:10px;
    padding:6px 12px;
    background:var(--bg-soft);
    border-radius:8px;
    font-size:12px;
  }
  .metric-mini .ml{color:var(--text-faint);font-size:11px}
  .metric-mini .mv{font-weight:700;font-family:var(--display)}
  .metric-mini .md{
    font-family:var(--mono);font-size:11px;font-weight:600;
    padding:2px 6px;border-radius:4px;
  }
  .metric-mini .md.up{background:#d1fae5;color:#065f46}
  .metric-mini .md.dn{background:#fee2e2;color:#991b1b}
  .metric-mini .md.flat{background:var(--bg);color:var(--text-faint)}

  .card-actions{
    display:flex;gap:4px;
  }
  .icon-btn{
    width:30px;height:30px;border-radius:7px;
    background:transparent;border:0;cursor:pointer;
    color:var(--text-faint);font-size:14px;
    display:flex;align-items:center;justify-content:center;
    transition:.15s;
  }
  .icon-btn:hover{background:var(--bg-soft);color:var(--indigo)}

  /* ============== EMPTY ============== */
  .empty{
    text-align:center;padding:80px 30px;
    color:var(--text-faint);
    background:#fff;border:1px dashed var(--line);border-radius:var(--r);
  }
  .empty .e-icon{font-size:32px;margin-bottom:12px;opacity:.4}
  .empty h3{font-family:var(--display);font-size:18px;color:var(--text-dim);margin-bottom:6px}

  /* ============== FLOATING ACTION ============== */
  .fab{
    position:fixed;bottom:32px;right:32px;z-index:30;
    background:var(--text);color:#fff;
    padding:14px 22px;border-radius:999px;
    font-weight:600;font-size:13px;
    box-shadow:0 8px 24px rgba(10,10,16,.2),0 16px 48px rgba(10,10,16,.15);
    display:flex;align-items:center;gap:8px;
    cursor:pointer;
    transition:.18s;
    border:0;font-family:inherit;
  }
  .fab:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(10,10,16,.25),0 24px 60px rgba(10,10,16,.2)}
  .fab .dot{width:8px;height:8px;border-radius:50%;background:#10b981;box-shadow:0 0 8px #10b981}

  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#d4d4d8;border-radius:10px;border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:#a1a1aa}

  @media (max-width:760px){
    .wrap{padding:24px 18px 100px}
    .hero{padding:24px;border-radius:18px}
    .hero h1{font-size:30px}
    .hero-stats{grid-template-columns:repeat(2,1fr)}
    .nav-search{display:none}
    .card-title{font-size:17px}
  }
</style>
</head>
<body>

<nav class="top">
  <div class="nav-in">
    <div class="brand">
      <span class="brand-mark"></span>
      Pulse <small>BETA</small>
    </div>
    <div class="nav-search">
      <span>⌕</span>
      <span style="color:var(--text-faint)">搜索洞察、来源、主题…</span>
      <span class="kbd">⌘ K</span>
    </div>
    <div class="nav-right">
      <div class="nav-icon" title="通知">◔</div>
      <div class="nav-icon" title="收藏">★</div>
      <div class="avatar">W</div>
    </div>
  </div>
</nav>

<div class="wrap">

  <!-- TIME ROW -->
  <div class="time-row">
    <span class="time-label">时间范围</span>
    <button class="tchip" data-range="24">当天 <span class="n">3</span></button>
    <button class="tchip" data-range="72">3 天内 <span class="n">5</span></button>
    <button class="tchip on" data-range="168">一周 <span class="n">6</span></button>
    <button class="tchip" data-range="720">一个月 <span class="n">8</span></button>
    <button class="tchip" data-range="4320">半年 <span class="n">9</span></button>
    <button class="tchip" data-range="99999">全部 <span class="n">10</span></button>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-grain"></div>
    <div class="hero-content">
      <div class="hero-eyebrow">AI Daily Digest · 自动生成于 06:00</div>
      <h1>本周值得知道的，<em>已经为你过滤完毕</em>。</h1>
      <p class="hero-sub">从你订阅的 32 个来源里，AI 提炼出本周高置信度信号。点开任意一条可让 AI 进一步展开影响、对比历史、推演未来。</p>
      <div class="hero-stats">
        <div class="hstat"><div class="l">匹配洞察</div><div class="v" id="hCount">6</div></div>
        <div class="hstat"><div class="l">平均置信度</div><div class="v" id="hConf">89<small>%</small></div></div>
        <div class="hstat"><div class="l">高影响条目</div><div class="v" id="hImp">4</div></div>
        <div class="hstat"><div class="l">覆盖来源</div><div class="v" id="hSrc">6</div></div>
      </div>
    </div>
  </section>

  <!-- SECTION HEAD -->
  <div class="sec-h">
    <h2>洞察 Feed</h2>
    <span class="scope" id="scopeLabel">最近 7 天</span>
    <span class="meta">按时间倒序 · 已过滤噪音</span>
  </div>

  <div class="feed" id="feed"></div>

</div>

<button class="fab"><span class="dot"></span>问 AI 任何事</button>

const SCOPE_LABEL = { 24:"今天", 72:"最近 3 天", 168:"最近 7 天", 720:"最近 30 天", 4320:"最近半年", 99999:"全部时间" };

let curRange = 168;

const feed = document.getElementById("feed");
const scopeLabel = document.getElementById("scopeLabel");
const hCount = document.getElementById("hCount");
const hConf = document.getElementById("hConf");
const hImp = document.getElementById("hImp");
const hSrc = document.getElementById("hSrc");

function fmtAgo(h){
  if(h<1) return "刚刚";
  if(h<24) return `${h} 小时前`;
  if(h<168) return `${Math.round(h/24)} 天前`;
  if(h<720) return `${Math.round(h/24)} 天前`;
  return `${Math.round(h/24)} 天前`;
}

function impPill(n){
  if(n>=5) return `<span class="imp-pill hi">关键</span>`;
  if(n>=4) return `<span class="imp-pill md">重要</span>`;
  return `<span class="imp-pill">常规</span>`;
}

function textColor(hex){
  return (hex==="#000000"||hex==="#1c1c1c"||hex==="#2200cc"||hex==="#1c5e3a"||hex==="#b31b1b") ? "#fff":"#fff";
}

function highlight(summary){
  // highlight first key fragment after the comma
  return summary;
}

function render(){
  const list = INSIGHTS.filter(x=>x.hours<=curRange);
  scopeLabel.textContent = SCOPE_LABEL[curRange];
  hCount.textContent = list.length;
  if(list.length){
    hConf.innerHTML = Math.round(list.reduce((a,b)=>a+b.confidence,0)/list.length*100)+"<small>%</small>";
    hImp.textContent = list.filter(x=>x.importance>=4).length;
    hSrc.textContent = new Set(list.map(x=>x.source)).size;
  }

  if(!list.length){
    feed.innerHTML = `
      <div class="empty">
        <div class="e-icon">○</div>
        <h3>当前时间窗内没有匹配的洞察</h3>
        <p>试着换一个更长的时间范围，或者调整订阅主题</p>
      </div>`;
    return;
  }

  feed.innerHTML = list.map((x,i)=>`
    <article class="card ${x.featured?"featured":""}" style="animation-delay:${i*60}ms">
      <header class="card-h">
        <div class="src">
          <span class="src-logo" style="background:${x.color};color:${textColor(x.color)}">${x.abbr}</span>
          <span class="src-name">${x.source}</span>
          ${x.confidence>=0.95?`<span class="verified">✓</span>`:""}
        </div>
        <span class="card-time">${fmtAgo(x.hours)}</span>
        ${impPill(x.importance)}
      </header>
      <h3 class="card-title">${x.title}</h3>
      <p class="card-sum">${x.summary}</p>
      <div class="card-foot">
        ${x.topics.map(t=>`<span class="topic-tag">${t}</span>`).join("")}
        <div class="metric-mini">
          <span class="ml">${x.metric.label}</span>
          <span class="mv">${x.metric.value}</span>
          <span class="md ${x.metric.dir}">${x.metric.delta}</span>
        </div>
        <div class="card-actions">
          <button class="icon-btn" title="收藏">★</button>
          <button class="icon-btn" title="问 AI">⌒</button>
          <button class="icon-btn" title="分享">↗</button>
        </div>
      </div>
    </article>
  `).join("");
}

document.querySelector(".time-row").addEventListener("click",e=>{
  const b=e.target.closest(".tchip");if(!b)return;
  document.querySelectorAll(".tchip").forEach(x=>x.classList.remove("on"));
  b.classList.add("on");
  curRange = +b.dataset.range;
  render();
  window.scrollTo({top:0,behavior:"smooth"});
});

render();
</script>
